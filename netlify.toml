# Deploy this entire folder as the site root (drag-and-drop or Git).
# Netlify serves index.html at /. Relative asset paths (spiral.png, etc.) require this.

[build]
  publish = "."

# Optional: long cache for images (filenames are versioned by content when you replace files)
[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Always fetch fresh HTML so shader/renderer fixes show up immediately after deploy.
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
